services:
  screenshoter:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override in .env or here.
      BROWSER_MAX_CONCURRENT: "5"
    # Playwright needs /dev/shm; the default 64 MB is too small for Chromium.
    shm_size: "1gb"
    restart: unless-stopped
    healthcheck:
      # Use python (always present) instead of curl (not in python:3.12-slim).
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
